name: Weekly YouTube Report

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

jobs:
  youtube-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

- name: Run YouTube report
  env:
    API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
    CHANNEL_ID: UCoxEzjSLMSFEyoQacaZJ2A
  run: |
    mkdir -p reports
    python youtube_weekly_report.py \
      --api-key "$API_KEY" \
      --channel-id "$CHANNEL_ID" \
      --output reports/youtube_weekly_report.csv
