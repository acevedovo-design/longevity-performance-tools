name: Weekly YouTube Report

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

jobs:
  youtube-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run YouTube report
        env:
          API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          CHANNEL_ID: UCoxEzjSLMSFEyoQacaZJ2A
        run: |
          mkdir -p reports
          python youtube_weekly_report.py \
            --api-key "$API_KEY" \
            --channel-id "$CHANNEL_ID" \
            --output reports/youtube_weekly_report.csv

      - name: Commit updated state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .youtube_report_state.json || true
          git commit -m "Update YouTube report state" || echo "No changes"
          git push

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-weekly-report
          path: reports/youtube_weekly_report.csv
          
